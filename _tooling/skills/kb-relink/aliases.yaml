# ---- extend below as you find phrases the heuristic misses -----------------
# Tip: after running /kb-relink, look at the "orphan anchors" list -- any anchor
# you expected to see additions for but didn't probably needs an alias here.
#
# Disambiguation: synthesis anchors (filenames like "kvs-webrtc-as-fleet-frame-plane")
# are intentionally NOT slug-heuristic-derived to avoid collision with the
# more-specific entity/concept anchors they reference. Synthesis aliases must be
# declared explicitly here when needed -- usually they aren't, since synthesis
# notes are linked-to from peer notes via cross-reference sections, not from
# inline prose elsewhere.

