# kb-relink curated alias dictionary
#
# Maps an anchor slug (the .md filename without extension) to the list of prose
# phrases that should be linked to it. The skill auto-derives phrases from the
# slug + title + frontmatter aliases; this file adds the common-noun / branded /
# alternate-spelling forms the heuristic can't infer.
#
# Format:
#   <anchor-slug>:
#     - "Phrase 1"
#     - "Phrase 2"
#
# Conventions:
#   - List phrases LONGEST FIRST so the matcher prefers more specific matches.
#   - Use exact casing as it appears in prose (PyAV, not pyav, when proper-noun).
#   - Add plurals/possessives explicitly if you want them matched (e.g., "PyAV's").
#   - To disambiguate: if a phrase could resolve to two anchors, keep it on only
#     one side and remove from the other. The skill warns on collisions.
#
# Hard-skip phrases (never link these no matter what) live in SKILL.md Step 3,
# not here.

